<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Bumblebee → Spark Revolution</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(ellipse at 50% 0%, #1a1030 0%, #0a0612 60%, #050308 100%);
      color: #f5e6c8;
      overflow: hidden;
      user-select: none;
    }

    h1 {
      font-size: clamp(1.2rem, 4vw, 2rem);
      letter-spacing: 0.15em;
      text-transform: uppercase;
      margin-bottom: 0.25rem;
      background: linear-gradient(90deg, #ffd54f, #ff8f00, #ffd54f);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .subtitle {
      font-size: 0.85rem;
      opacity: 0.6;
      margin-bottom: 2rem;
      letter-spacing: 0.08em;
    }

    .stage {
      position: relative;
      width: min(90vw, 520px);
      height: min(90vw, 520px);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .orbit {
      position: absolute;
      inset: 0;
      animation: spin 24s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .shape-btn {
      position: absolute;
      width: 72px;
      height: 72px;
      border: none;
      cursor: pointer;
      transition: transform 0.15s ease, filter 0.15s ease;
      filter: drop-shadow(0 0 12px rgba(255, 200, 50, 0.4));
    }

    .shape-btn:hover { transform: scale(1.12); filter: drop-shadow(0 0 20px rgba(255, 200, 50, 0.8)); }
    .shape-btn:active { transform: scale(0.92); }

    .shape-btn.circle  { top: 4%;  left: 50%; transform: translateX(-50%); background: #ff6b6b; border-radius: 50%; }
    .shape-btn.square  { top: 50%; right: 4%;  transform: translateY(-50%); background: #4ecdc4; border-radius: 8px; }
    .shape-btn.triangle{ bottom: 8%; left: 18%; width: 0; height: 0;
      border-left: 36px solid transparent; border-right: 36px solid transparent;
      border-bottom: 62px solid #a78bfa; background: none; filter: drop-shadow(0 0 12px rgba(167,139,250,0.5)); }
    .shape-btn.hexagon { bottom: 12%; right: 14%; background: #ffd54f; clip-path: polygon(50% 0%, 100% 25%, 100% 75%, 50% 100%, 0% 75%, 0% 25%); }
    .shape-btn.diamond { top: 22%; left: 6%; background: #f472b6; transform: rotate(45deg); border-radius: 4px; }

    .shape-btn.circle:hover  { transform: translateX(-50%) scale(1.12); }
    .shape-btn.square:hover  { transform: translateY(-50%) scale(1.12); }

    .bee {
      position: relative;
      z-index: 2;
      cursor: pointer;
      transition: transform 0.2s ease;
      animation: hover 3s ease-in-out infinite;
    }

    .bee:hover { transform: scale(1.08); }
    .bee.buzz { animation: buzz 0.35s ease; }

    @keyframes hover {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-10px); }
    }

    @keyframes buzz {
      0%, 100% { transform: rotate(0deg) scale(1); }
      25% { transform: rotate(-6deg) scale(1.05); }
      75% { transform: rotate(6deg) scale(1.05); }
    }

    .bee svg { width: 140px; height: 140px; filter: drop-shadow(0 8px 24px rgba(255, 180, 0, 0.5)); }

    .spark-layer {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .spark {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ffd54f;
      box-shadow: 0 0 8px #ff8f00, 0 0 16px #ff6f00;
      animation: spark-fly 0.8s ease-out forwards;
    }

    @keyframes spark-fly {
      0% { opacity: 1; transform: translate(0, 0) scale(1); }
      100% { opacity: 0; transform: translate(var(--dx), var(--dy)) scale(0); }
    }

    .revolution-meter {
      margin-top: 2rem;
      width: min(80vw, 360px);
      text-align: center;
    }

    .meter-label {
      font-size: 0.75rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      opacity: 0.5;
      margin-bottom: 0.5rem;
    }

    .meter-bar {
      height: 8px;
      background: rgba(255,255,255,0.08);
      border-radius: 99px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, #ff8f00, #ffd54f, #fff176);
      border-radius: 99px;
      transition: width 0.3s ease;
      box-shadow: 0 0 12px rgba(255, 200, 50, 0.6);
    }

    .meter-count {
      margin-top: 0.5rem;
      font-size: 0.8rem;
      opacity: 0.7;
    }

    .ignited {
      animation: pulse-glow 1.5s ease-in-out infinite;
    }

    @keyframes pulse-glow {
      0%, 100% { text-shadow: 0 0 20px rgba(255, 200, 50, 0.3); }
      50% { text-shadow: 0 0 40px rgba(255, 200, 50, 0.8), 0 0 80px rgba(255, 100, 0, 0.4); }
    }

    .flash {
      position: fixed;
      inset: 0;
      background: radial-gradient(circle, rgba(255,200,50,0.25) 0%, transparent 70%);
      opacity: 0;
      pointer-events: none;
      z-index: 9;
      transition: opacity 0.15s ease;
    }

    .flash.on { opacity: 1; }
  </style>
</head>
<body>
  <h1 id="title">Bumblebee</h1>
  <p class="subtitle">shapes + sounds → spark revolution</p>

  <div class="stage">
    <div class="orbit">
      <button class="shape-btn circle"  data-note="0" aria-label="circle"></button>
      <button class="shape-btn square"  data-note="1" aria-label="square"></button>
      <button class="shape-btn triangle" data-note="2" aria-label="triangle"></button>
      <button class="shape-btn hexagon" data-note="3" aria-label="hexagon"></button>
      <button class="shape-btn diamond" data-note="4" aria-label="diamond"></button>
    </div>

    <div class="bee" id="bee" title="buzz the bee">
      <svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
        <ellipse cx="50" cy="55" rx="28" ry="22" fill="#ffd54f"/>
        <ellipse cx="50" cy="55" rx="28" ry="22" fill="none" stroke="#1a1a1a" stroke-width="5"/>
        <line x1="30" y1="48" x2="70" y2="48" stroke="#1a1a1a" stroke-width="4"/>
        <line x1="30" y1="58" x2="70" y2="58" stroke="#1a1a1a" stroke-width="4"/>
        <line x1="30" y1="68" x2="70" y2="68" stroke="#1a1a1a" stroke-width="4"/>
        <circle cx="72" cy="42" r="10" fill="#1a1a1a"/>
        <circle cx="75" cy="40" r="3" fill="#fff"/>
        <ellipse cx="38" cy="32" rx="18" ry="10" fill="rgba(200,220,255,0.5)" transform="rotate(-20 38 32)"/>
        <ellipse cx="62" cy="32" rx="18" ry="10" fill="rgba(200,220,255,0.5)" transform="rotate(20 62 32)"/>
        <path d="M22 55 Q8 35 18 20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
        <path d="M78 55 Q92 35 82 20" fill="none" stroke="#1a1a1a" stroke-width="2"/>
      </svg>
    </div>
  </div>

  <div class="revolution-meter">
    <div class="meter-label">revolution charge</div>
    <div class="meter-bar"><div class="meter-fill" id="fill"></div></div>
    <div class="meter-count" id="count">tap shapes. buzz the bee. ignite.</div>
  </div>

  <div class="spark-layer" id="sparks"></div>
  <div class="flash" id="flash"></div>

  <script>
    const notes = [261.63, 329.63, 392.00, 523.25, 659.25];
    const freqs  = [110, 140, 180, 220, 280];
    let audioCtx, charge = 0;
    const THRESHOLD = 12;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    function playTone(freq, type = 'sine', dur = 0.25, gain = 0.15) {
      ensureAudio();
      const t = audioCtx.currentTime;
      const osc = audioCtx.createOscillator();
      const g = audioCtx.createGain();
      osc.type = type;
      osc.frequency.setValueAtTime(freq, t);
      g.gain.setValueAtTime(gain, t);
      g.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.connect(g).connect(audioCtx.destination);
      osc.start(t);
      osc.stop(t + dur);
    }

    function buzz() {
      ensureAudio();
      const t = audioCtx.currentTime;
      for (let i = 0; i < 8; i++) {
        const osc = audioCtx.createOscillator();
        const g = audioCtx.createGain();
        osc.type = 'sawtooth';
        osc.frequency.setValueAtTime(90 + Math.random() * 60, t + i * 0.04);
        g.gain.setValueAtTime(0.06, t + i * 0.04);
        g.gain.exponentialRampToValueAtTime(0.001, t + i * 0.04 + 0.06);
        osc.connect(g).connect(audioCtx.destination);
        osc.start(t + i * 0.04);
        osc.stop(t + i * 0.04 + 0.07);
      }
    }

    function spark(x, y, n = 14) {
      const layer = document.getElementById('sparks');
      for (let i = 0; i < n; i++) {
        const s = document.createElement('div');
        s.className = 'spark';
        const angle = (Math.PI * 2 * i) / n + Math.random() * 0.5;
        const dist = 60 + Math.random() * 100;
        s.style.left = x + 'px';
        s.style.top = y + 'px';
        s.style.setProperty('--dx', Math.cos(angle) * dist + 'px');
        s.style.setProperty('--dy', Math.sin(angle) * dist + 'px');
        layer.appendChild(s);
        setTimeout(() => s.remove(), 900);
      }
    }

    function addCharge(amount, x, y) {
      charge = Math.min(charge + amount, THRESHOLD + 5);
      const pct = Math.min(100, (charge / THRESHOLD) * 100);
      document.getElementById('fill').style.width = pct + '%';

      if (charge >= THRESHOLD && !document.body.classList.contains('ignited')) {
        ignite();
      } else {
        document.getElementById('count').textContent =
          `charge: ${Math.floor(pct)}% — keep going`;
      }
      spark(x, y, amount > 1 ? 18 : 10);
    }

    function ignite() {
      document.body.classList.add('ignited');
      document.getElementById('title').textContent = 'REVOLUTION SPARKED';
      document.getElementById('count').textContent = 'bumblebee has spoken. w0rld changed.';
      const flash = document.getElementById('flash');
      flash.classList.add('on');
      setTimeout(() => flash.classList.remove('on'), 300);

      [261.63, 329.63, 392, 523.25, 659.25, 783.99].forEach((f, i) => {
        setTimeout(() => playTone(f, 'triangle', 0.5, 0.12), i * 120);
      });
      setTimeout(buzz, 600);

      const cx = innerWidth / 2, cy = innerHeight / 2;
      for (let w = 0; w < 5; w++) {
        setTimeout(() => spark(cx + (Math.random()-0.5)*200, cy + (Math.random()-0.5)*200, 30), w * 200);
      }
    }

    document.querySelectorAll('.shape-btn').forEach(btn => {
      btn.addEventListener('click', e => {
        const i = +btn.dataset.note;
        playTone(notes[i], 'sine', 0.3, 0.18);
        playTone(freqs[i], 'square', 0.1, 0.04);
        addCharge(1, e.clientX, e.clientY);
      });
    });

    document.getElementById('bee').addEventListener('click', e => {
      const bee = e.currentTarget;
      bee.classList.remove('buzz');
      void bee.offsetWidth;
      bee.classList.add('buzz');
      buzz();
      addCharge(2, e.clientX, e.clientY);
    });

    document.body.addEventListener('click', ensureAudio, { once: true });
  </script>
</body>
</html>
